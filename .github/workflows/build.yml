name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Extract Build Information
      id: build_info
      run: |
        VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F'"' '{print $2}')
        PACKAGE_ID=$(grep "applicationId =" app/build.gradle.kts | awk -F'"' '{print $2}')
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "package_id=$PACKAGE_ID" >> $GITHUB_OUTPUT

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

    - name: Create pocketmal.properties
      run: |
        echo "keystore=release.keystore" > pocketmal.properties
        echo "keystore.password=${{ secrets.KEYSTORE_PASSWORD }}" >> pocketmal.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> pocketmal.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> pocketmal.properties
        echo "clientId=${{ secrets.MAL_CLIENT_ID }}" >> pocketmal.properties
        echo "redirectUrl=${{ secrets.MAL_REDIRECT_URL }}" >> pocketmal.properties

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/${{ steps.build_info.outputs.package_id }}-${{ steps.build_info.outputs.version_name }}.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build_info.outputs.package_id }}-${{ steps.build_info.outputs.version_name }}
        path: app/build/outputs/apk/release/${{ steps.build_info.outputs.package_id }}-${{ steps.build_info.outputs.version_name }}.apk
