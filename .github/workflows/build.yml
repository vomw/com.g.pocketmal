name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

    - name: Create pocketmal.properties
      run: |
        echo "keystore=release.keystore" > pocketmal.properties
        echo "keystore.password=${{ secrets.KEYSTORE_PASSWORD }}" >> pocketmal.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> pocketmal.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> pocketmal.properties
        echo "clientId=${{ secrets.MAL_CLIENT_ID }}" >> pocketmal.properties
        echo "redirectUrl=${{ secrets.MAL_REDIRECT_URL }}" >> pocketmal.properties

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: pocketmal-release
        path: app/build/outputs/apk/release/app-release.apk
